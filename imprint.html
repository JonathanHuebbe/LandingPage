<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprint | BetterStorage</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="assets/fonts/inter.css">
    <script src="assets/js/lucide.min.js"></script>
    <script>
        const initialTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = initialTheme;
    </script>
    <style>
        .impressum-content {
            padding: 100px 0;
            max-width: 800px;
            margin: 0 auto;
        }

        .impressum-content h1 {
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .impressum-content h2 {
            margin-top: 40px;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .impressum-content p {
            margin-bottom: 15px;
            color: var(--text-muted);
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" style="text-decoration: none;">
                <div class="logo">
                    <i data-lucide="server"></i>
                    <span>BetterStorage</span>
                </div>
            </a>
            <div class="nav-actions">
                <div class="lang-switch">
                    <a href="imprint.html" class="active">EN</a>
                    <span>/</span>
                    <a href="impressum.html">DE</a>
                </div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
                    <i data-lucide="sun" class="sun-icon"></i>
                    <i data-lucide="moon" class="moon-icon"></i>
                </button>
                <a href="index.html" class="btn btn-outline">Back</a>
            </div>
        </div>
    </nav>

    <main class="impressum-content container">
        <h1>Imprint</h1>
        <p>
            Jonathan Hübbe<br>
            Emil-Warburg-Weg 19<br>
            95547 Bayreuth
        </p>

        <h2>Contact</h2>
        <p>
            Phone: +49 176 46101213<br>
            E-Mail: info@betterstorage.com
        </p>
    </main>

    <footer>
        <div class="container footer-container">
            <div class="logo">
                <i data-lucide="server"></i>
                <span>BetterStorage</span>
            </div>
            <div class="footer-links">
                <a href="imprint.html">Imprint</a>
                <a href="privacy-policy.html">Privacy Policy</a>

            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            const html = document.documentElement;
            const newTheme = html.dataset.theme === 'dark' ? 'light' : 'dark';
            html.dataset.theme = newTheme;
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>

</html>
